{% extends "base.html" %}
{% block title %}Delete Category · SpendWise{% endblock %}
{% block heading %}Delete Category{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-5"><div class="card p-4 text-center">
    <div class="text-danger fs-1 mb-2"><i class="bi bi-exclamation-triangle"></i></div>
    <h5>Delete "{{ cat.name }}"?</h5>
    <p class="text-muted">Categories with existing transactions cannot be deleted.</p>
    <form method="post" class="d-flex gap-2 justify-content-center">{% csrf_token %}
    <button type="submit" class="btn btn-danger"><i class="bi bi-trash"></i> Delete</button>
    <a href="{% url 'category_list' %}" class="btn btn-outline-secondary">Cancel</a></form>
</div></div></div>
{% endblock %}
