{% extends "base.html" %}
{% block title %}Edit Category · SpendWise{% endblock %}
{% block heading %}Edit Category{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-5"><div class="card p-4">
    <form method="post">{% csrf_token %}
    {% for field in form %}<div class="mb-3">
        <label class="form-label">{{ field.label }}</label>{{ field }}
        {% for error in field.errors %}<div class="text-danger small">{{ error }}</div>{% endfor %}
    </div>{% endfor %}
    <div class="d-flex gap-2">
        <button class="btn btn-primary"><i class="bi bi-check-lg"></i> Save</button>
        <a href="{% url 'category_list' %}" class="btn btn-outline-secondary">Cancel</a></div>
    </form>
</div></div></div>
{% endblock %}
