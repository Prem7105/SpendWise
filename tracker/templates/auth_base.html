{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}SpendWise{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
</head>
<body>
<div class="auth-wrapper p-3">
    <div class="card auth-card shadow-lg p-4">
    <div class="text-center mb-4">
        <div class="fs-2 text-primary"><i class="bi bi-wallet2"></i></div>
        <h4 class="fw-bold mb-0">SpendWise</h4>
        <p class="text-muted small">{% block subtitle %}Track your money, simply.{% endblock %}</p>
    </div>
    {% if messages %}{% for m in messages %}<div class="alert alert-{{ m.tags }} py-2">{{ m }}</div>{% endfor %}{% endif %}
    {% block content %}{% endblock %}
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
